<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yomi-Mail | نظام حقيقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- التنسيق الاحترافي (نفس التصميم الذي تحبه) --- */
        :root {
            --primary-grad: linear-gradient(135deg, #6366f1, #10b981);
            --bg-dark: #090919;
            --card-glass: rgba(30, 41, 59, 0.7);
            --text-main: #ffffff;
            --accent-cyan: #22d3ee;
        }

        body {
            background: radial-gradient(circle at top, #1e293b, #090919);
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            display: flex; justify-content: center;
            padding: 20px; min-height: 100vh; margin: 0;
        }

        .container { width: 100%; max-width: 450px; text-align: center; }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .email-display {
            background: #020617; padding: 18px; border-radius: 18px;
            margin-bottom: 20px; border: 1px solid #6366f1;
        }

        #emailAddr {
            background: transparent; border: none; color: var(--accent-cyan);
            width: 100%; text-align: center; font-size: 18px; font-weight: bold; outline: none;
        }

        .btn-large {
            background: var(--primary-grad);
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            color: white; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 15px;
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .u-btn { padding: 12px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 14px; }
        .c-blue { background: #3b82f6; } .c-green { background: #10b981; } .c-orange { background: #f59e0b; } .c-red { background: #ef4444; }

        /* صندوق الرسائل */
        .messages-container { text-align: right; }
        .message-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px; padding: 15px; margin-bottom: 10px;
            border-right: 4px solid var(--accent-cyan);
            cursor: pointer; transition: 0.3s;
        }
        .message-item:hover { background: rgba(255,255,255,0.1); }
        .msg-sender { font-weight: bold; font-size: 14px; color: var(--accent-cyan); }
        .msg-subject { font-size: 13px; color: #cbd5e1; margin-top: 5px; }

        .loading-dots:after { content: '...'; animation: dots 1.5s infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } }

        .timer-bar { height: 4px; background: var(--accent-cyan); width: 0%; transition: 1s linear; border-radius: 2px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <header style="margin-bottom: 20px;">
            <h1>Yomi-Mail</h1>
            <p>بريد مؤقت حقيقي وشغال 100%</p>
        </header>

        <div class="glass-card">
            <div class="email-display">
                <input type="text" id="emailAddr" readonly value="جاري التوليد...">
            </div>
            <button onclick="createNewEmail()" class="btn-large">✨ إنشاء بريد جديد</button>
            <div class="btn-grid">
                <button onclick="copyEmail()" class="u-btn c-blue">📋 نسخ</button>
                <button onclick="checkMessages()" class="u-btn c-green">🔄 تحديث</button>
                <button onclick="createNewEmail()" class="u-btn c-orange">🔀 تغيير</button>
                <button onclick="location.reload()" class="u-btn c-red">🗑️ حذف</button>
            </div>
            <div id="pBar" class="timer-bar"></div>
            <p id="statusTxt" style="font-size: 11px; margin-top: 10px; color: #94a3b8;">تحديث تلقائي كل 10 ثوانٍ</p>
        </div>

        <div class="glass-card">
            <h3 style="margin-bottom: 15px; display: flex; justify-content: space-between;">
                📥 الرسائل الواردة
                <span id="count" style="font-size: 12px; background: #3b82f6; padding: 2px 8px; border-radius: 10px;">0</span>
            </h3>
            <div id="messagesList" class="messages-container">
                <p style="text-align: center; color: #64748b; padding: 20px;" class="loading-dots">بانتظار وصول رسائل جديدة</p>
            </div>
        </div>
    </div>

    <script>
        let currentEmail = "";
        let login = "";
        let domain = "";
        let timeLeft = 10;

        async function createNewEmail() {
            const res = await fetch('https://www.1secmail.com/api/v1/?action=genEmail&count=1');
            const data = await res.json();
            currentEmail = data[0];
            [login, domain] = currentEmail.split('@');
            document.getElementById('emailAddr').value = currentEmail;
            document.getElementById('messagesList').innerHTML = '<p style="text-align: center; color: #64748b; padding: 20px;">الصندوق فارغ حالياً</p>';
            resetTimer();
        }

        async function checkMessages() {
            if(!login) return;
            const res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${login}&domain=${domain}`);
            const msgs = await res.json();
            const list = document.getElementById('messagesList');
            document.getElementById('count').innerText = msgs.length;

            if(msgs.length > 0) {
                list.innerHTML = "";
                msgs.forEach(m => {
                    const item = document.createElement('div');
                    item.className = 'message-item';
                    item.innerHTML = `
                        <div class="msg-sender">من: ${m.from}</div>
                        <div class="msg-subject">${m.subject}</div>
                        <div style="font-size: 10px; color: #475569; margin-top: 5px;">اضغط للقراءة</div>
                    `;
                    item.onclick = () => window.open(`https://www.1secmail.com/mailbox/?action=readMessage&id=${m.id}&login=${login}&domain=${domain}`, '_blank');
                    list.appendChild(item);
                });
            }
        }

        function resetTimer() {
            timeLeft = 10;
            updateTimerUI();
        }

        function updateTimerUI() {
            document.getElementById('pBar').style.width = `${((10-timeLeft)/10)*100}%`;
        }

        setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                updateTimerUI();
            } else {
                checkMessages();
                timeLeft = 10;
            }
        }, 1000);

        function copyEmail() {
            const input = document.getElementById('emailAddr');
            input.select();
            document.execCommand('copy');
            alert("تم النسخ ✅");
        }

        window.onload = createNewEmail;
    </script>
</body>
</html>

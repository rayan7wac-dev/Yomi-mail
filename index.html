<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yomi-Mail | بريد مؤقت احترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: linear-gradient(135deg, #6366f1, #10b981);
            --bg: #090919;
            --card: rgba(30, 41, 59, 0.7);
            --text: #ffffff;
            --accent: #22d3ee;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: radial-gradient(circle at top, #1e293b, #090919);
            color: var(--text);
            font-family: 'Tajawal', sans-serif;
            display: flex; justify-content: center;
            padding: 20px; min-height: 100vh;
        }

        .container { width: 100%; max-width: 450px; text-align: center; }

        /* الهيدر */
        header { margin-bottom: 30px; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }
        header h1 { font-size: 32px; color: #60a5fa; }
        header p { color: #94a3b8; font-size: 14px; }

        /* الكرت الزجاجي */
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(15px);
            border-radius: 28px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-bottom: 25px;
        }

        .status-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 13px; color: #94a3b8; }
        .status-dot { height: 10px; width: 10px; background: #10b981; border-radius: 50%; box-shadow: 0 0 10px #10b981; }

        /* حقل الإيميل */
        .email-box {
            background: #020617;
            padding: 18px;
            border-radius: 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        #emailAddr {
            background: transparent; border: none; color: var(--accent);
            width: 100%; text-align: center; font-size: 18px; font-weight: bold; outline: none;
        }

        /* الأزرار */
        .main-btn {
            background: var(--primary);
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            color: white; font-weight: bold; font-size: 16px; margin-bottom: 15px;
            cursor: pointer; transition: 0.3s;
        }

        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn {
            padding: 12px; border-radius: 12px; border: none; color: white;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .copy { background: #3b82f6; }
        .refresh { background: #10b981; }
        .change { background: #f59e0b; }
        .delete { background: #ef4444; }

        /* العداد الاحترافي */
        .timer-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px; padding: 10px; margin-top: 15px;
            position: relative; overflow: hidden;
        }
        .progress-bar {
            position: absolute; top: 0; left: 0; height: 100%; background: rgba(34, 211, 238, 0.2);
            width: 0%; transition: width 1s linear;
        }
        .timer-text { position: relative; z-index: 2; font-size: 12px; color: var(--accent); }

        /* صندوق الوارد */
        .inbox-card {
            background: var(--card); border-radius: 28px; padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .inbox-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .empty-state { padding: 40px 0; color: #64748b; }
        .mailbox-icon { font-size: 45px; display: block; margin-bottom: 10px; }

        footer { margin-top: 40px; color: #475569; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <span>✉️</span>
                <h1>بريد مؤقت</h1>
            </div>
            <p>أسرع خدمة بريد لحماية خصوصيتك - Rayan</p>
        </header>

        <div class="glass-card">
            <div class="status-bar">
                <span>نشط الآن</span>
                <span class="status-dot"></span>
            </div>

            <div class="email-box">
                <input type="text" id="emailAddr" readonly value="جاري التحميل...">
            </div>

            <button onclick="generateNew()" class="main-btn">✨ إنشاء بريد جديد</button>

            <div class="grid-btns">
                <button onclick="copyEmail()" class="btn copy">📋 نسخ</button>
                <button onclick="refreshManual()" class="btn refresh">🔄 تحديث</button>
                <button onclick="generateNew()" class="btn change">🔀 تغيير</button>
                <button onclick="deleteEmail()" class="btn delete">🗑️ حذف</button>
            </div>

            <div class="timer-box">
                <div id="progress" class="progress-bar"></div>
                <div class="timer-text" id="timerDisplay">تحديث تلقائي بعد 10 ثانية</div>
            </div>
        </div>

        <div class="inbox-card">
            <div class="inbox-header">
                <h2>📥 الرسائل الواردة</h2>
                <span id="count" style="background:#3b82f6; padding:2px 10px; border-radius:10px; font-size:12px;">0 رسائل</span>
            </div>
            <div class="empty-state">
                <span class="mailbox-icon">📬</span>
                <p>لا توجد رسائل بعد</p>
            </div>
        </div>

        <footer>
            <p>© 2026 بريد مؤقت - تطوير Rayan</p>
        </footer>
    </div>

    <script>
        let user = Math.random().toString(36).substring(2, 10);
        let domain = "1secmail.com";
        let timeLeft = 10;

        function updateEmail() {
            document.getElementById('emailAddr').value = `${user}@${domain}`;
            resetTimer();
        }

        function resetTimer() {
            timeLeft = 10;
            updateUI();
        }

        function updateUI() {
            document.getElementById('timerDisplay').innerText = `تحديث تلقائي بعد ${timeLeft} ثانية`;
            document.getElementById('progress').style.width = `${((10 - timeLeft) / 10) * 100}%`;
        }

        setInterval(() => {
            if(timeLeft > 0) {
                timeLeft--;
                updateUI();
            } else {
                checkMail();
                resetTimer();
            }
        }, 1000);

        function copyEmail() {
            const input = document.getElementById('emailAddr');
            input.select();
            document.execCommand('copy');
            alert("تم النسخ بنجاح! ✅");
        }

        function generateNew() {
            user = Math.random().toString(36).substring(2, 10);
            updateEmail();
        }

        function deleteEmail() {
            if(confirm("حذف البريد؟")) generateNew();
        }

        function refreshManual() {
            resetTimer();
            alert("تم تحديث الصندوق 🔄");
        }

        async function checkMail() {
            // منطق جلب الرسائل من الـ API
            console.log("Checking mail...");
        }

        window.onload = updateEmail;
    </script>
</body>
</html>

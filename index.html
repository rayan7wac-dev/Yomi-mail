<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yomi-Mail | بريد مؤقت احترافي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-area">
                <span class="icon">✉️</span>
                <h1>بريد مؤقت</h1>
            </div>
            <p>خدمة سريعة وآمنة من تطوير Rayan</p>
        </header>

        <section class="glass-card">
            <div class="timer-display">
                <span class="timer-label">صلاحية البريد:</span>
                <span id="countdown">60:00</span>
            </div>

            <div class="email-box">
                <input type="text" id="emailAddr" readonly value="جاري التحميل...">
            </div>

            <div class="button-grid">
                <button onclick="copyEmail()" class="btn btn-blue">📋 نسخ</button>
                <button onclick="refreshManual()" class="btn btn-green">🔄 تحديث</button>
                <button onclick="generateNew()" class="btn btn-orange">🔀 تغيير</button>
                <button onclick="deleteEmail()" class="btn btn-red">🗑️ حذف</button>
            </div>
        </section>

        <section class="glass-card inbox-section">
            <div class="inbox-header">
                <h2>📥 الرسائل الواردة</h2>
                <span id="msgCount" class="badge">0</span>
            </div>
            <div id="messagesList" class="messages-container">
                <p class="waiting">بانتظار الرسائل... ✨</p>
            </div>
        </section>

        <footer>
            <p>🛡️ تطبيق آمن 100% ومحمي</p>
            <p>© 2026 Yomi-Mail</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>

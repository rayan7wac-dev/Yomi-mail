<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yomi-Mail | بريد مؤقت</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>📧 Yomi-Mail</h1>
            <p>بريدك المؤقت من تطوير Rayan</p>
        </header>

        <div class="main-card">
            <div class="email-section">
                <input type="text" id="emailAddr" readonly value="جاري التوليد...">
                <button onclick="copyEmail()" class="btn-copy">نسخ</button>
            </div>
            
            <div class="actions">
                <button onclick="generateNew()" class="btn-change">تغيير البريد</button>
            </div>
        </div>

        <div class="inbox">
            <h2>📥 الرسائل الواردة</h2>
            <div id="messagesList">لا توجد رسائل حالياً...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
